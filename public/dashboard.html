<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – VoltraBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #04050a; --surface: #0d0f1a; --surface2: #121526;
      --border: #1e2135; --accent: #5865f2; --voltra: #00d4ff;
      --voltra-dim: rgba(0,212,255,0.1); --text: #e8eaf6; --muted: #6b7299;
      --green: #23d18b; --red: #f04747;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none; z-index: 0;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(4,5,10,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; font-size: 1.2rem; font-weight: 800; color: var(--voltra); text-decoration: none; }
    .logo-icon { width: 30px; height: 30px; background: var(--voltra); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; color: #000; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .user-chip { display: flex; align-items: center; gap: 0.6rem; background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 0.4rem 1rem; font-size: 0.85rem; }
    .user-avatar { width: 24px; height: 24px; border-radius: 50%; }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1.2rem; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; border: none; text-decoration: none; transition: all .2s; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--red); color: var(--red); }

    main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem; }

    .page-header { margin-bottom: 2.5rem; }
    .page-label { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--voltra); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.75rem; }
    .page-header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    .page-header p { color: var(--muted); margin-top: 0.5rem; font-size: 0.95rem; }

    .guilds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }

    .guild-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      text-decoration: none; color: var(--text);
      transition: all .2s; cursor: pointer;
    }
    .guild-card:hover { border-color: rgba(0,212,255,0.4); transform: translateY(-2px); background: var(--surface2); }

    .guild-icon {
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--accent); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.1rem; overflow: hidden;
    }
    .guild-icon img { width: 100%; height: 100%; object-fit: cover; }

    .guild-info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.2rem; }
    .guild-info .guild-meta { font-size: 0.78rem; color: var(--muted); display: flex; align-items: center; gap: 0.4rem; }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-active { background: var(--green); }
    .status-inactive { background: var(--muted); }

    .empty-state {
      text-align: center; padding: 4rem 2rem;
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: 12px;
    }
    .empty-state h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .empty-state p { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4752c4; }

    .loading { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--voltra); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/"><div class="logo-icon">V</div> VoltraBot</a>
  <div class="nav-right">
    <div class="user-chip" id="user-chip">
      <div class="spinner"></div> Laden...
    </div>
    <a href="/auth/logout" class="btn btn-outline">Abmelden</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-label">// Dashboard</div>
    <h1>Deine Server</h1>
    <p>Wähle einen Server, um den Bot zu konfigurieren. Du siehst nur Server, auf denen du Admin bist.</p>
  </div>

  <div id="guilds-container" class="loading">
    <div class="spinner"></div> Server werden geladen...
  </div>
</main>

<script>
  async function init() {
    const res = await fetch('/api/me');
    const { user, guilds } = await res.json();

    // User Chip
    const chip = document.getElementById('user-chip');
    if (user) {
      const avatar = user.avatar
        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.webp?size=64`
        : `https://cdn.discordapp.com/embed/avatars/0.png`;
      chip.innerHTML = `<img src="${avatar}" class="user-avatar" /> ${user.username}`;
    }

    // Guilds
    const container = document.getElementById('guilds-container');

    if (!guilds || guilds.length === 0) {
      container.className = '';
      container.innerHTML = `
        <div class="empty-state">
          <div style="font-size:3rem;margin-bottom:1rem;">🤖</div>
          <h2>Noch keine Server</h2>
          <p>Lade den Bot zuerst auf deinen Server ein, dann erscheint er hier.</p>
          <a href="/invite" class="btn btn-primary">⚡ Bot einladen</a>
        </div>`;
      return;
    }

    container.className = 'guilds-grid';
    container.innerHTML = guilds.map(g => {
      const icon = g.icon
        ? `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.webp?size=64" />`
        : g.name.split(' ').map(w => w[0]).join('').slice(0, 2);
      return `
        <a class="guild-card" href="/dashboard/${g.id}">
          <div class="guild-icon">${icon}</div>
          <div class="guild-info">
            <h3>${g.name}</h3>
            <div class="guild-meta">
              <div class="status-dot status-inactive" id="dot-${g.id}"></div>
              <span id="status-${g.id}">Prüfe Status...</span>
            </div>
          </div>
        </a>`;
    }).join('');

    // Status für jeden Server prüfen
    guilds.forEach(async g => {
      try {
        const r = await fetch(`/api/guild/${g.id}`);
        const cfg = await r.json();
        const dot = document.getElementById(`dot-${g.id}`);
        const status = document.getElementById(`status-${g.id}`);
        if (cfg.channelId) {
          dot.className = 'status-dot status-active';
          status.textContent = 'Bot aktiv';
        } else {
          status.textContent = 'Noch nicht konfiguriert';
        }
      } catch {}
    });
  }

  init();
</script>
</body>
</html>
